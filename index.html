<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Login</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />
    <!-- tailwind + daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-md mx-auto bg-base-200">
    <div class="logo w-[200px] mx-auto pt-40">
      <img src="./assets/Logo-full.png" alt="" />
    </div>
    <div class="form pt-10">
      <fieldset class="fieldset bg-base-100 rounded-2xl w-xs p-9 mx-auto">

        <label class="label font-medium text-[#080808]">Mobile Number</label>
        <input id="input-number" maxlength="11" minlength="11" type="tel" class="input border-none rounded-full bg-base-300" placeholder="Enter your number" value="01234567890" />

        <label class="label font-medium text-[#080808]">4 Digit Pin</label>
        <input id="input-pin" maxlength="4" minlength="4" type="password" class="input border-none rounded-full bg-base-300" placeholder="Enter 4 Digit Pin" />

        <button id="login-btn" class="btn btn-primary mt-4 rounded-full">Login</button>
      </fieldset>
    </div>
    <script src="./script/login.js"></script>
  </body>
</html>
